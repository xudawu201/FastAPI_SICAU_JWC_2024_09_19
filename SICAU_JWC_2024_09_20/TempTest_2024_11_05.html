<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航菜单</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #left_div {
            width: 200px;
        }
        .menu {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .menu li {
            position: relative;
            border-bottom: 1px solid #ddd;
        }
        .menu li > button {
            width: 100%;
            background: none;
            border: none;
            padding: 10px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .menu li > button .icon {
            margin-right: 10px;
            font-size: 18px;
        }
        .submenu {
            display: none;
            list-style-type: none;
            padding: 0;
            margin: 0;
            padding-left: 20px;
            background-color: #f9f9f9;
        }
        .submenu li {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        .submenu li:last-child {
            border-bottom: none;
        }
        .menu li.open .submenu {
            display: block;
        }
        .nav_bar_divider {
            border: none;
            border-top: 1px solid #ddd;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="left_div">
    <ul class="menu">
        <li>
            <button onclick="show_iframe(); toggleMenu(this)">
                <span class="icon">📊</span> 成绩可视化
                <span>▾</span>
            </button>
            <hr class="nav_bar_divider">
        </li>
        <li>
            <button onclick="toggleMenu(this)">
                <span class="icon">📅</span> 智能排课
                <span>▾</span>
            </button>
            <ul class="submenu">
                <li><a href="#schedule_sub1">排课子项1</a></li>
                <li><a href="#schedule_sub2">排课子项2</a></li>
            </ul>
            <hr class="nav_bar_divider">
        </li>
        <li>
            <button onclick="toggleMenu(this)">
                <span class="icon">🔍</span> 超级查询
                <span>▾</span>
            </button>
            <ul class="submenu">
                <li><a href="#search_sub1">查询子项1</a></li>
                <li><a href="#search_sub2">查询子项2</a></li>
            </ul>
            <hr class="nav_bar_divider">
        </li>
        <li>
            <button onclick="toggleMenu(this)">
                <span class="icon">🤖</span> 智能问答
                <span>▾</span>
            </button>
            <ul class="submenu">
                <li><a href="#qa_sub1">问答子项1</a></li>
                <li><a href="#qa_sub2">问答子项2</a></li>
            </ul>
            <hr class="nav_bar_divider">
        </li>
        <li>
            <button onclick="window.location.href='http://localhost:8080'">
                <span class="icon">🛠️</span> 智能工具
            </button>
            <hr class="nav_bar_divider">
        </li>
    </ul>
</div>

<script>
    function toggleMenu(button) {
        const menuItem = button.parentElement;
        menuItem.classList.toggle('open');
    }
</script>

</body>
</html>
