<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级查询</title>
    <style>
        /* 三列布局 */
        .container {
            display: flex;
            gap: 20px;
        }
        .column {
            width: 30%;
            padding: 10px;
            border: 1px solid #ddd;
            max-height: 80vh;
            overflow-y: auto;
        }
        table, th, td {
            border: 1px solid #000;
            border-collapse: collapse;
            padding: 5px;
        }
        /* 设置标题样式 */
        h3 {
            margin-top: 0;
        }
    </style>
    <script>
        async function searchTables() {
            const query = document.getElementById("search").value;
            const response = await fetch(`/search?query=${query}`);
            const data = await response.json();

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "";  // 清空之前的搜索结果

            // 显示搜索结果中的表和列
            data.tables.forEach(table => {
                const tableDiv = document.createElement("div");
                tableDiv.innerHTML = `<strong>${table.table_name}</strong>`;

                table.columns.forEach(column => {
                    const columnDiv = document.createElement("div");
                    columnDiv.innerHTML = column;
                    tableDiv.appendChild(columnDiv);
                });

                // 点击表名时在中间列显示列信息和在右侧显示内容
                tableDiv.onclick = () => {
                    viewTableColumns(table.table_name, table.columns);
                    viewTableData(table.table_name);
                    viewRelatedTables(table.table_name);
                };

                resultsDiv.appendChild(tableDiv);
            });
        }

        // 中间列：显示表格的列信息
        function viewTableColumns(tableName, columns) {
            const tableColumnsDiv = document.getElementById("tableColumns");
            tableColumnsDiv.innerHTML = `<h3>Table: ${tableName}</h3>`;

            columns.forEach(column => {
                const columnDiv = document.createElement("div");
                columnDiv.innerText = column;
                tableColumnsDiv.appendChild(columnDiv);
            });
        }

        // 右侧：显示表格的内容
        async function viewTableData(tableName) {
            const response = await fetch(`/table/${tableName}/data`);
            const data = await response.json();
            const tableDiv = document.getElementById("tableData");
            tableDiv.innerHTML = `<h3>Data: ${data.table_name}</h3>`;

            const table = document.createElement("table");
            const headerRow = document.createElement("tr");
            Object.keys(data.data[0] || {}).forEach(col => {
                const th = document.createElement("th");
                th.innerText = col;
                headerRow.appendChild(th);
            });
            table.appendChild(headerRow);

            data.data.forEach(row => {
                const tr = document.createElement("tr");
                Object.values(row).forEach(value => {
                    const td = document.createElement("td");
                    td.innerText = value;
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });

            tableDiv.appendChild(table);
        }

        // 右侧：显示相关表格
        async function viewRelatedTables(tableName) {
            const response = await fetch(`/related_tables/${tableName}`);
            const data = await response.json();
            const relatedTablesDiv = document.getElementById("relatedTables");
            relatedTablesDiv.innerHTML = "<h3>Related Tables</h3>";

            data.related_tables.forEach(table => {
                const tableDiv = document.createElement("div");
                tableDiv.innerText = table;
                relatedTablesDiv.appendChild(tableDiv);
            });
        }
    </script>
</head>
<body>
    <h1>超级查询</h1>
    <input type="text" id="search" placeholder="请输入查询关键词" oninput="searchTables()">
    
    <!-- 三列布局 -->
    <div class="container">
        <div class="column" id="results">
            <h3>搜索结果</h3>
        </div>
        <div class="column" id="tableColumns">
            <h3>表列信息</h3>
        </div>
        <div class="column" id="tableData">
            <h3>表内容</h3>
            <div id="relatedTables"></div>
        </div>
    </div>
</body>
</html>
