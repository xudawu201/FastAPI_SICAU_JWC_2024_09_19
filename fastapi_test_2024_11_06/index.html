    <script>
        
        // 向服务器发送消息，启动循环
        function startProcess() {
            const ws = new WebSocket("/ws_search_database");
            // 在 WebSocket 连接打开时发送消息
            ws.onopen = function() {
                ws.send("专业");
            };

            // 监听从WebSocket接收到的消息
            ws.onmessage = function(event) {
                const messageDiv = document.getElementById("messages");
                messageDiv.innerHTML += `<p>${event.data}</p>`;  // 显示消息
            };
        }
    </script>
</body>
