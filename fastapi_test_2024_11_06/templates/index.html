<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级查询</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .top-section {
            display: flex;
            gap: 10px;
        }

        .content-box {
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
        }

        #results, #columns, #fieldMatches {
            height: 150px;
            width: 45%;
        }

        #tableData {
            height: 500px;
            overflow-y: auto;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .pagination button {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
    <script>
        let currentPage = 1;
        const pageLimit = 10;
        let totalPages = 1;
        let startPage = 1;

        async function searchTables() {
            const query = document.getElementById("search").value;

            if (!query.trim()) {
                document.getElementById("results").innerHTML = "";
                return;
            }

            const response = await fetch(`/search?query=${query}`);
            const data = await response.json();

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "";

            data.tables.forEach(table => {
                const tableDiv = document.createElement("div");
                tableDiv.innerHTML = `<strong>${table.table_name}:</strong>`;

                if (table.columns.length > 0) {
                    tableDiv.innerHTML += ` ${table.columns.join(", ")}`;
                }

                tableDiv.onclick = () => viewTableColumns(table.table_name);
                resultsDiv.appendChild(tableDiv);
            });
        }

        async function viewTableColumns(tableName) {
            const response = await fetch(`/table/${tableName}/columns`);
            const data = await response.json();
            const columnsDiv = document.getElementById("columns");
            columnsDiv.innerHTML = `<h3>表: ${data.table_name}</h3>`;

            data.columns.forEach(column => {
                const columnDiv = document.createElement("div");
                columnDiv.innerHTML = `${column.column_name} (${column.data_type})`;
                columnsDiv.appendChild(columnDiv);
            });

            currentPage = 1;
            startPage = 1;
            loadTableData(tableName, currentPage);
            loadFieldMatches(tableName);
        }

        async function loadFieldMatches(tableName) {
            const query = document.getElementById("search").value;

            if (!query.trim()) {
                document.getElementById("fieldMatches").innerHTML = "";
                return;
            }

            const response = await fetch(`/table/${tableName}/fields?query=${query}`);
            const data = await response.json();
            const fieldMatchesDiv = document.getElementById("fieldMatches");
            fieldMatchesDiv.innerHTML = "";

            data.fields.forEach(field => {
                const fieldDiv = document.createElement("div");
                fieldDiv.innerHTML = `<strong>表名: ${field.table_name}, 字段: ${field.column_name}</strong><br>匹配值: ${field.match_value}`;
                fieldMatchesDiv.appendChild(fieldDiv);
            });
        }

        async function loadTableData(tableName, page) {
            const response = await fetch(`/table/${tableName}/data?page=${page}&limit=${pageLimit}`);
            const data = await response.json();
            const tableDiv = document.getElementById("tableData");
            tableDiv.innerHTML = `<h3>表内容: ${data.table_name}</h3>`;

            if (data.data.length === 0) {
                tableDiv.innerHTML += "<p>无数据</p>";
                return;
            }

            const table = document.createElement("table");
            const headerRow = document.createElement("tr");
            Object.keys(data.data[0]).forEach(col => {
                const th = document.createElement("th");
                th.innerText = col;
                headerRow.appendChild(th);
            });
            table.appendChild(headerRow);

            data.data.forEach(row => {
                const tr = document.createElement("tr");
                Object.values(row).forEach(value => {
                    const td = document.createElement("td");
                    td.innerText = value;
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });

            tableDiv.appendChild(table);
            totalPages = data.total_pages;
            renderPagination(tableName);
        }

        function renderPagination(tableName) {
            const paginationDiv = document.createElement("div");
            paginationDiv.className = "pagination";
            paginationDiv.innerHTML = "";

            const prevButton = document.createElement("button");
            prevButton.innerText = "上一页";
            prevButton.disabled = currentPage === 1;
            prevButton.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadTableData(tableName, currentPage);
                    adjustScrollToBottom();
                }
            };
            paginationDiv.appendChild(prevButton);

            const halfRange = 5;
            let start = Math.max(1, currentPage - halfRange);
            let end = Math.min(totalPages, currentPage + halfRange);

            if (end - start < 9) {
                start = Math.max(1, end - 9);
            }

            for (let i = start; i <= end; i++) {
                const button = document.createElement("button");
                button.innerText = i;
                button.onclick = () => {
                    currentPage = i;
                    loadTableData(tableName, i);
                    adjustScrollToBottom();
                };
                if (i === currentPage) {
                    button.style.fontWeight = "bold";
                }
                paginationDiv.appendChild(button);
            }

            const nextButton = document.createElement("button");
            nextButton.innerText = "下一页";
            nextButton.disabled = currentPage === totalPages;
            nextButton.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    loadTableData(tableName, currentPage);
                    adjustScrollToBottom();
                }
            };
            paginationDiv.appendChild(nextButton);

            document.getElementById("tableData").appendChild(paginationDiv);
        }

        function adjustScrollToBottom() {
            const tableDataDiv = document.getElementById("tableData");
            tableDataDiv.scrollTop = tableDataDiv.scrollHeight + 20;
        }
    </script>
</head>
<body>
    <h1>超级查询</h1>
    <input type="text" id="search" placeholder="请输入查询关键词" oninput="searchTables()">
    <div class="container">
        <div class="top-section">
            <div id="results" class="content-box">相关表格</div>
            <div id="columns" class="content-box">相关字段</div>
        </div>
        <div id="fieldMatches" class="content-box">相关字段匹配</div>
        <div id="tableData" class="content-box">表格内容</div>
    </div>
</body>
</html>
