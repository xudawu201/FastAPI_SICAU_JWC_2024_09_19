<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        .input-field {
            width: 93%;
            padding: 10px;
            margin: 10px 0px;

            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #218838;
        }

        .error-message {
            color: red;
            text-align: center;
            display: none;
        }

        .toggle-btn {
            margin-top: 10px;
            text-align: center;
            cursor: pointer;
            color: #007bff;
        }
    </style>
    <script>
        // 页面完全加载完成后时，通过后端验证 session_token 是否有效,访问 /verify-token路径，这是后端用于验证 session_token 的接口
        window.onload = async function() {
            const response = await fetch('/verify-token', {
                method: 'GET',
                credentials: 'include'  // 允许携带 HttpOnly Cookie
            });
            // 解析响应，判断是否验证通过
            if (response.ok) {
                // 如果后端验证通过，重定向路径
                window.location.href = '/login_success';
            }
            else {
                // 如果后端验证失败，保持在登录页面
                console.log('Invalid or expired token, staying on login page.');
            }
        }
    </script>
</head>
<body>

    <div class="login-container" id="login-form">
        <h2>用户登录</h2>
        <input type="text" id="login-username" class="input-field" placeholder="用户名" required>
        <input type="password" id="login-password" class="input-field" placeholder="密码" required>
        <button class="btn" onclick="login()">登录</button>
        <p id="login-error-message" class="error-message">用户名或密码错误</p>
        <div class="toggle-btn" onclick="toggleForms()">没有账号？注册</div>
    </div>

    <div class="login-container" id="register-form" style="display: none;">
        <h2>用户注册</h2>
        <input type="text" id="register-username" class="input-field" placeholder="用户名" required>
        <input type="password" id="register-password" class="input-field" placeholder="密码" required>
        <input type="password" id="confirm-password" class="input-field" placeholder="确认密码" required>
        <button class="btn" onclick="register()">注册</button>
        <p id="register-error-message" class="error-message">注册失败，请重试</p>
        <div class="toggle-btn" onclick="toggleForms()">已有账号？登录</div>
    </div>

    <script>
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }
        
        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorMessage = document.getElementById('login-error-message');

            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                window.location.href = '/login_success';
            } else {
                errorMessage.style.display = 'block';
            }
        }

        async function register() {
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMessage = document.getElementById('register-error-message');

            if (!username) {
                errorMessage.textContent = '用户名不能为空';
                errorMessage.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = '密码不匹配';
                errorMessage.style.display = 'block';
                return;
            }

            const response = await fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                alert('注册成功，请登录');
                toggleForms();
            } else {
                errorMessage.textContent = '注册失败，请重试';
                errorMessage.style.display = 'block';
            }
        }
    </script>

</body>
</html>
