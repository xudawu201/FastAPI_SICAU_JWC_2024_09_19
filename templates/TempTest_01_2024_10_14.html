<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Div Layout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        /* 顶端横幅 */
        #header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px;
            height: 100px;
            width: 100%;
        }
        /* 左侧竖直小窗口 */
        #sidebar {
            background-color: #f4f4f4;
            padding: 10px;
            width: 200px;
            height: calc(100vh - 100px); /* 减去顶部横幅的高度 */
            position: fixed;
            top: 100px; /* 顶部横幅高度 */
            left: 0;
            overflow-y: auto;
        }
        /* 剩余的主窗口 */
        #content {
            margin-left: 210px; /* 给左侧竖直窗口留出空间 */
            padding: 20px;
            height: calc(100vh - 100px);
            background-color: #eaeaea;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>Page Header</h1>
        <p>This is the top banner of the page</p>
    </div>

    <div id="sidebar">
        <h2>Sidebar</h2>
        <p>This is the left vertical window</p>
        <p>Additional content can be placed here</p>
    </div>

    <div id="content">
        <h2>Main Content</h2>
        <p>This is the remaining window area for the main content</p>
    </div>

</body>
</html>
