<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可交互的折线图</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="myDiv" style="width: 100%; height: 100%;"></div>
    <script>
        // 数据
        var trace1 = {
            x: [1, 2, 3, 4, 5],
            y: [2, 3, 5, 4, 6],
            mode: 'lines+markers',
            type: 'scatter',
            name: '系列1'
        };

        var trace2 = {
            x: [1, 2, 3, 4, 5],
            y: [1, 3, 4, 2, 5],
            mode: 'lines+markers',
            type: 'scatter',
            name: '系列2'
        };

        var data = [trace1, trace2];

        // 布局
        var layout = {
            title: '可交互的折线图示例',
            xaxis: {
                title: 'X 轴'
            },
            yaxis: {
                title: 'Y 轴'
            }
        };

        // 绘制图表
        Plotly.newPlot('myDiv', data, layout);
    </script>
</body>
</html>
