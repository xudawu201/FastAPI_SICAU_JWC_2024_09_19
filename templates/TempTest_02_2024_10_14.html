<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆角按钮</title>
    <style>
        .user-info {
            display: flex; /* 使用flex布局 */
            align-items: center; /* 垂直居中对齐 */
        }
    
        .user-info span {
            margin-right: 10px; /* 添加右边距以分隔文本和按钮 */
        }
    
        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px; /* 按钮宽度 */
            height: 30px; /* 按钮高度 */
            border: 2px solid black;
            border-radius: 15px; /* 圆角半径 */
            background-color: #f0f0f0; /* 按钮背景色 */
            cursor: pointer;
            position: relative;
            transition: background-color 0.3s; /* 添加过渡效果 */
        }
    
        .button:hover {
            background-color: #e0e0e0; /* 悬停时改变背景色 */
        }
    
        .button::before,
        .button::after {
            content: '';
            position: absolute;
            width: 60%; /* 横线宽度 */
            height: 4px; /* 横线高度 */
            background-color: black; /* 横线颜色 */
        }
    
        .button::before {
            top: 10px; /* 第一条横线距离顶部的距离 */
        }
    
        .button::after {
            top: 16px; /* 第二条横线距离顶部的距离 */
        }
    
        .button .line {
            width: 60%; /* 横线宽度 */
            height: 4px; /* 横线高度 */
            background-color: black; /* 横线颜色 */
            position: absolute;
            top: 22px; /* 第三条横线距离顶部的距离 */
        }
    </style>
</head>
<body>

    <button class="button">
        <div class="line"></div>
    </button>

</body>
</html>
