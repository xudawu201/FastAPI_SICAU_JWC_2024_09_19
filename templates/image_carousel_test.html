<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片轮播</title>
    <style>
        #carousel {
            position: relative;
            width: 1300px;
            height: 400px;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }
        #slides {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: left 0.5s;
            display: flex; /* 使用 Flexbox 布局 */
            justify-content: center; /* 水平居中 */
            align-items: center; /* 垂直居中 */
        }
        .slide {
            width: 100%;
            height: 100%;
            display: none;
            border: 5px gainsboro; /* 添加灰色外边框 */
            box-sizing: border-box; /* 确保边框不影响元素大小 */
        }
        .active {
            display: block;
        }
        #indicators {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            margin: 0 5px;
            background-color: #bbb;
            border-radius: 50%;
            cursor: pointer;
        }
        .active-indicator {
            background-color: #555;
        }
    </style>
    <script>
        let currentSlide = 0;
        function showSlides(slideNumber) {
            const slides = document.getElementsByClassName("slide");
            const indicators = document.getElementsByClassName("indicator");
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
                indicators[i].classList.remove("active-indicator");
            }
            if (slideNumber !== undefined) {
                currentSlide = slideNumber;
            }
            slides[currentSlide].classList.add("active");
            indicators[currentSlide].classList.add("active-indicator");
        }

        window.addEventListener('DOMContentLoaded', function () {
            showSlides(); // 初始化显示第一张幻灯片
            const indicators = document.getElementsByClassName("indicator");
            for (let i = 0; i < indicators.length; i++) {
                indicators[i].addEventListener('click', function () {
                    showSlides(i);
                });
            }
        });
        setInterval(() => {
            currentSlide = (currentSlide + 1) % document.getElementsByClassName("slide").length;
            showSlides();
        }, 3000);
    </script>
</head>
<body>
    <div id="carousel">
        <div id="slides">
            <img class="slide active" src="asset\image1.jpg" alt="图片1">
            <img class="slide" src="asset\image2.png" alt="图片2">
            <img class="slide" src="asset\image3.jpg" alt="图片3">
            <img class="slide" src="asset\image4.jpg" alt="图片3">
        </div>
        <div id="indicators">
            <span class="indicator active-indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
        </div>
    </div>
    <!-- 嵌入其他网页 -->
    <iframe src="https://www.bilibili.com/" width="100%" height="400"></iframe>
</body>
</html>
