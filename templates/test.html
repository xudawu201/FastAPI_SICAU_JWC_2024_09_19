<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Word Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
</head>
<body>

<div id="content">
    <h1>导出的内容</h1>
    <p>这是导出的内容的一部分。你可以在这里添加更多的文本和其他元素，比如列表、表格等。</p>
    <ul>
        <li>项目一</li>
        <li>项目二</li>
        <li>项目三</li>
    </ul>
</div>

<button id="exportBtn">导出为Word文档</button>

<script>
document.getElementById('exportBtn').addEventListener('click', function() {
    var content = document.getElementById('content').innerHTML;
    
    // 构造Word文档的基本结构
    var docXml = `
        <?xml version="1.0" encoding="UTF-8"?>
        <w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
            <w:body>
                <w:p w:rsidR="004C23B6" w:rsidRPr="004C23B6" w:rsidRDefault="004C23B6">
                    <w:pPr>
                        <w:pStyle w:val="Normal"/>
                    </w:pPr>
                    <w:r w:rsidR="004C23B6">
                        <w:t>${content}</w:t>
                    </w:r>
                </w:p>
            </w:body>
        </w:document>
    `;
    
    // 创建ZIP文件
    var zip = new JSZip();
    
    // 内容类型文件
    zip.file("[Content_Types].xml", `
        <?xml version="1.0" encoding="UTF-8"?>
        <Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
            <Default Extension="xml" ContentType="application/xml"/>
            <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
            <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
            <Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>
            <Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>
            <Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>
        </Types>
    `);
    
    // 关系文件
    zip.file("_rels/.rels", `
        <?xml version="1.0" encoding="UTF-8"?>
        <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
            <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
            <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>
            <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>
        </Relationships>
    `);
    
    // 核心属性文件
    zip.file("docProps/core.xml", `
        <?xml version="1.0" encoding="UTF-8"?>
        <cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:dcmitype="http://purl.org/dc/dcmitype/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
            <dc:title>Document Title</dc:title>
            <dcterms:created xsi:type="dcterms:W3CDTF">2024-09-20T17:23:00Z</dcterms:created>
            <cp:lastModifiedBy>User</cp:lastModifiedBy>
        </cp:coreProperties>
    `);
    
    // 应用程序特定属性文件
    zip.file("docProps/app.xml", `
        <?xml version="1.0" encoding="UTF-8"?>
        <Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties">
            <Application>Microsoft Office Word</Application>
            <DocSecurity>0</DocSecurity>
            <ScaleCrop>false</ScaleCrop>
            <HeadingPairs>
                <vt:vector size="2" baseType="variant">
                    <vt:variant>
                        <vt:i4>0</vt:i4>
                    </vt:variant>
                    <vt:variant>
                        <vt:i4>0</vt:i4>
                    </vt:variant>
                </vt:vector>
            </HeadingPairs>
        </Properties>
    `);
    
    // 文档主体文件
    zip.file("word/document.xml", docXml);
    
    // 样式文件
    zip.file("word/styles.xml", `
        <?xml version="1.0" encoding="UTF-8"?>
        <w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
            <w:style w:type="paragraph" w:styleId="Normal">
                <w:name>
                    <w:val>Normal</w:val>
                </w:name>
                <w:qFormat/>
                <w:pPr>
                    <w:spacing w:before="240" w:line="280" w:lineRule="auto"/>
                </w:pPr>
                <w:rPr>
                    <w:rFonts w:ascii="Calibri" w:hAnsi="Calibri" w:asciiTheme="minorHAnsi" w:hAnsiTheme="minorHAnsi"/>
                    <w:sz w:val="18"/>
                    <w:szCs w:val="18"/>
                    <w:lang w:eastAsia="en-US" w:hAnsi="en-US" w:bidi="ar-SA"/>
                </w:rPr>
            </w:style>
        </w:styles>
    `);
    
    // 设置文件
    zip.file("word/settings.xml", `
        <?xml version="1.0" encoding="UTF-8"?>
        <w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
            <w:compat>
                <w:useAltKernOutsideFonts/>
                <w:doNotUseSideBySideIfVeryTight/>
                <w:useTypoMetrics/>
                <w:doNotExpandShiftReturn/>
                <w:adjustLineHeightInTable/>
                <w:breakWrappedTables/>
                <w:splitPgBreakAndParaMark/>
                <w:applyBreakingRules/>
                <w:doNotWrapTextWithPunct/>
                <w:wrapTrailSpaces/>
                <w:doNotUseEastAsianBreakRules/>
                <w:use悬挂标点字符/>
                <w:useAsianBreakRules/>
                <w:doNotUseKnockoutRules/>
                <w:doNotTrimFontHeightInCell/>
                <w:doNotSuppressIndentation/>
                <w:doNotAutofitConstrainedTables/>
                <w:doNotVertAlignCellWithSp/>
                <w:doNotBreakConstrainedForcedTables/>
                <w:doNotUseFELayout/>
            </w:compat>
        </w:settings>
    `);
    
    // 生成ZIP文件并下载
    zip.generateAsync({type:"blob"}).then(function(content) {
        saveAs(content, "exported_content.docx");
    });
});
</script>

</body>
</html>
