<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教务管理系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>教务管理系统</h1>
    
    <!-- 学生信息管理 -->
    <div id="student-management">
        <h2>学生信息管理</h2>
        <button onclick="addStudent()">添加学生</button>
        <table id="students-table">
            <thead>
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>年龄</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 学生数据将通过JavaScript动态添加 -->
            </tbody>
        </table>
    </div>

    <!-- 课程安排 -->
    <div id="course-management">
        <h2>课程安排</h2>
        <button onclick="addCourse()">添加课程</button>
        <table id="courses-table">
            <thead>
                <tr>
                    <th>课程号</th>
                    <th>课程名</th>
                    <th>教师</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 课程数据将通过JavaScript动态添加 -->
            </tbody>
        </table>
    </div>

    <!-- 成绩查询 -->
    <div id="grade-query">
        <h2>成绩查询</h2>
        <form onsubmit="queryGrades(event)">
            <label for="student-id">学号:</label>
            <input type="text" id="student-id" name="student-id" required>
            <button type="submit">查询</button>
        </form>
        <table id="grades-table">
            <thead>
                <tr>
                    <th>课程号</th>
                    <th>课程名</th>
                    <th>成绩</th>
                </tr>
            </thead>
            <tbody>
                <!-- 成绩数据将通过JavaScript动态添加 -->
            </tbody>
        </table>
    </div>

</div>

<script>
    // 示例数据
    const students = [
        { id: "001", name: "张三", age: 20 },
        { id: "002", name: "李四", age: 21 }
    ];

    const courses = [
        { id: "C001", name: "数学", teacher: "王老师" },
        { id: "C002", name: "英语", teacher: "赵老师" }
    ];

    // 添加学生
    function addStudent() {
        const studentId = prompt("请输入学号:");
        const studentName = prompt("请输入姓名:");
        const studentAge = prompt("请输入年龄:");

        if (studentId && studentName && studentAge) {
            students.push({ id: studentId, name: studentName, age: studentAge });
            updateStudentsTable();
        }
    }

    // 更新学生表格
    function updateStudentsTable() {
        const tableBody = document.querySelector("#students-table tbody");
        tableBody.innerHTML = "";
        students.forEach(student => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.age}</td>
                <td><button onclick="deleteStudent('${student.id}')">删除</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 删除学生
    function deleteStudent(studentId) {
        students = students.filter(student => student.id !== studentId);
        updateStudentsTable();
    }

    // 添加课程
    function addCourse() {
        const courseId = prompt("请输入课程号:");
        const courseName = prompt("请输入课程名:");
        const teacher = prompt("请输入教师:");

        if (courseId && courseName && teacher) {
            courses.push({ id: courseId, name: courseName, teacher: teacher });
            updateCoursesTable();
        }
    }

    // 更新课程表格
    function updateCoursesTable() {
        const tableBody = document.querySelector("#courses-table tbody");
        tableBody.innerHTML = "";
        courses.forEach(course => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${course.id}</td>
                <td>${course.name}</td>
                <td>${course.teacher}</td>
                <td><button onclick="deleteCourse('${course.id}')">删除</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 删除课程
    function deleteCourse(courseId) {
        courses = courses.filter(course => course.id !== courseId);
        updateCoursesTable();
    }

    // 查询成绩
    function queryGrades(event) {
        event.preventDefault();
        const studentId = document.querySelector("#student-id").value;
        const grades = [
            { courseId: "C001", courseName: "数学", grade: 95 },
            { courseId: "C002", courseName: "英语", grade: 88 }
        ].filter(grade => grade.courseId === studentId);

        updateGradesTable(grades);
    }

    // 更新成绩表格
    function updateGradesTable(grades) {
        const tableBody = document.querySelector("#grades-table tbody");
        tableBody.innerHTML = "";
        grades.forEach(grade => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${grade.courseId}</td>
                <td>${grade.courseName}</td>
                <td>${grade.grade}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 初始化表格
    updateStudentsTable();
    updateCoursesTable();
</script>

</body>
</html>
